# Conda environment for prompt-guided-dsm-refinement
# Create: conda env create -f environment.yml
# Activate: conda activate dsm-refine

name: dsm-refine
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  # Core deep learning
  - pytorch::pytorch>=2.0
  - pytorch::torchvision
  # GPU support: after creating environment, run:
  #   nvidia-smi  (check CUDA version)
  #   conda install pytorch-cuda=11.8 -c pytorch -c nvidia  (for CUDA 11.x)
  #   conda install pytorch-cuda=12.1 -c pytorch -c nvidia  (for CUDA 12.x)
  # Geospatial
  - conda-forge::rasterio>=1.3
  - conda-forge::geopandas>=0.14
  - fiona
  - pyproj
  # Data processing
  - numpy>=1.24
  - pandas>=2.0
  - scipy
  # opencv via pip to avoid gdk-pixbuf Windows locale bug
  - scikit-learn
  # Visualization
  # Utilities
  - pyyaml>=6.0
  - tqdm
  - pip
  - pip:
    - opencv-python>=4.8
    - matplotlib>=3.7
    - huggingface_hub
